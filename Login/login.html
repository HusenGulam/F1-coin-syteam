<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Coin Edu — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;background:#06091a;position:relative;overflow:hidden;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
}

.blob{position:absolute;border-radius:50%;pointer-events:none;}
.b1{width:420px;height:420px;top:-110px;left:-110px;
  background:radial-gradient(circle,rgba(0,140,255,0.13) 0%,transparent 65%);
  animation:fb 11s ease-in-out infinite;}
.b2{width:350px;height:350px;bottom:-80px;right:-80px;
  background:radial-gradient(circle,rgba(110,0,255,0.11) 0%,transparent 65%);
  animation:fb 11s ease-in-out infinite;animation-delay:4s;}
.b3{width:240px;height:240px;top:42%;left:6%;
  background:radial-gradient(circle,rgba(0,210,140,0.08) 0%,transparent 65%);
  animation:fb 11s ease-in-out infinite;animation-delay:7s;}
@keyframes fb{
  0%,100%{transform:translate(0,0) scale(1);}
  40%{transform:translate(18px,-22px) scale(1.05);}
  70%{transform:translate(-12px,14px) scale(0.96);}
}

.card{
  position:relative;width:100%;max-width:400px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:30px;padding:2.5rem 2rem 2.25rem;
  display:flex;flex-direction:column;align-items:center;
  animation:cardIn .55s cubic-bezier(.34,1.5,.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.97);}to{opacity:1;transform:none;}}
.card::before{
  content:'';position:absolute;top:0;left:18%;right:18%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.32),transparent);
}

.logo{
  width:72px;height:72px;border-radius:21px;
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.13);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  animation:lp 4s ease-in-out infinite;
}
@keyframes lp{
  0%,100%{border-color:rgba(255,255,255,0.13);}
  50%{border-color:rgba(0,175,255,0.45);}
}

.brand{color:#fff;font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.sub{color:rgba(255,255,255,0.28);font-size:11px;letter-spacing:1.3px;margin-bottom:1.85rem;}

.tabs{
  display:flex;gap:5px;padding:5px;border-radius:18px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);
  margin-bottom:2rem;
}
.tab{
  padding:8px 14px;border-radius:13px;font-size:10.5px;font-weight:700;
  cursor:pointer;border:none;background:transparent;
  color:rgba(255,255,255,0.3);letter-spacing:.6px;
  transition:all .22s ease;
}
.tab:hover{color:rgba(255,255,255,.65);}
.tab.active{color:#fff;}
.tab[data-role=student].active{background:rgba(0,195,140,.26);color:#00e8aa;}
.tab[data-role=teacher].active{background:rgba(230,60,100,.26);color:#ff7090;}
.tab[data-role=admin].active  {background:rgba(60,120,255,.26);color:#7ab8ff;}
.tab[data-role=otaona].active {background:rgba(220,180,40,.26);color:#ffd960;}

.form{width:100%;}
.fg{margin-top:1.1rem;}
.fl{
  display:block;color:rgba(255,255,255,0.3);
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  margin-bottom:8px;transition:color .22s;
}
.fg:focus-within .fl{color:rgba(255,255,255,0.68);}

.shell{
  position:relative;border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,255,255,0.09);
  transition:border-color .25s,background .25s;
}
.shell:hover{background:rgba(255,255,255,0.07);}
.shell:focus-within{
  background:rgba(255,255,255,0.09);
  border-color:rgba(0,200,255,0.4);
}

.shell .bar{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#00c8ff,#9060ff,#00c8ff);
  background-size:200% 100%;
  transform:scaleX(0);transform-origin:left center;
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  animation:barGlow 2s linear infinite paused;
}
.shell:focus-within .bar{
  transform:scaleX(1);
  animation-play-state:running;
}
@keyframes barGlow{
  0%{background-position:0% 0%;}
  100%{background-position:200% 0%;}
}

.inp-wrap{position:relative;}
.inp{
  width:100%;padding:18px 18px 8px;border:none;outline:none;
  background:transparent;font-size:15px;color:#fff;
  font-family:inherit;line-height:1;
}
.inp::placeholder{color:transparent;}
.inp-label{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,0.22);font-size:14px;
  pointer-events:none;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  transform-origin:left top;
}
.inp:focus ~ .inp-label,
.inp:not(:placeholder-shown) ~ .inp-label{
  transform:translateY(-155%) scale(0.78);
  color:rgba(0,210,255,0.7);
}

.inp-r{padding-right:50px;}
.eye{
  position:absolute;right:0;top:0;bottom:0;width:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,0.22);font-size:19px;
  transition:color .18s;user-select:none;
}
.eye:hover{color:rgba(255,255,255,.65);}

.btn{
  margin-top:1.7rem;width:100%;padding:16px;border-radius:16px;
  background:rgba(0,185,255,0.12);
  border:1.5px solid rgba(0,200,255,0.3);
  color:#00d4ff;font-size:14px;font-weight:700;letter-spacing:2px;
  cursor:pointer;font-family:inherit;
  position:relative;overflow:hidden;
  transition:all .22s ease;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,200,255,0.12),rgba(100,50,255,0.12));
  opacity:0;transition:opacity .22s;
}
.btn:hover{border-color:rgba(0,200,255,.65);color:#fff;transform:translateY(-1px);}
.btn:hover::after{opacity:1;}
.btn:active{transform:scale(.98);}

.btn .ripple{
  position:absolute;border-radius:50%;
  background:rgba(0,210,255,0.3);
  transform:scale(0);animation:rpl .5s linear;
  pointer-events:none;
}
@keyframes rpl{to{transform:scale(4);opacity:0;}}

.msg{
  margin-top:14px;padding:13px 16px;border-radius:14px;
  font-size:13px;text-align:center;font-weight:500;display:none;
  animation:mi .28s ease;
}
@keyframes mi{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
.ok{background:rgba(0,200,100,.1);color:#00e098;border:1px solid rgba(0,200,100,.28);display:block;}
.er{background:rgba(255,50,70,.1);color:#ff6070;border:1px solid rgba(255,50,70,.28);display:block;}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      <rect x="11" y="11" width="18" height="13" rx="3" fill="rgba(74,127,255,0.72)"/>
      <rect x="14.5" y="9.5" width="11" height="3.5" rx="1.75" fill="rgba(150,185,255,0.82)"/>
      <path d="M13 31L20 23L27 31" stroke="#00d4ff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="33" r="2.1" fill="#00d4ff"/>
    </svg>
  </div>
  <div class="brand">Coin Edu</div>
  <div class="sub">TA'LIM PLATFORMASI</div>

  <div class="tabs">
    <button class="tab active" data-role="student" onclick="pick(this)">STUDENT</button>
    <button class="tab" data-role="teacher" onclick="pick(this)">TEACHER</button>
    <button class="tab" data-role="admin" onclick="pick(this)">ADMIN</button>
    <button class="tab" data-role="otaona" onclick="pick(this)">OTA-ONA</button>
  </div>

  <div class="form">
    <div class="fg">
      <label class="fl" id="lbl">STUDENT LOGIN</label>
      <div class="shell">
        <div class="inp-wrap">
          <input class="inp" id="li" type="text" placeholder=" " autocomplete="off"/>
          <span class="inp-label" id="liPh">Student loginini kiriting</span>
        </div>
        <div class="bar"></div>
      </div>
    </div>

    <div class="fg">
      <label class="fl">PAROL</label>
      <div class="shell">
        <div class="inp-wrap">
          <input class="inp inp-r" id="pi" type="password" placeholder=" " autocomplete="off"/>
          <span class="inp-label">Parolni kiriting</span>
        </div>
        <div class="eye" onclick="toggleEye()" title="Ko'rsat/Yashir">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="bar"></div>
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="go(event)">KIRISH</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const LABELS = {
  student:"STUDENT LOGIN",
  teacher:"TEACHER LOGIN",
  admin:"ADMIN LOGIN",
  otaona:"OTA-ONA LOGIN"
};
const PLACEHOLDERS = {
  student:"Student loginini kiriting",
  teacher:"Teacher loginini kiriting",
  admin:"Admin loginini kiriting",
  otaona:"Ota-ona loginini kiriting"
};
const GREET = {
  student: n=>`Xush kelibsiz, ${n}! O'quvchi paneliga kirildi ✓`,
  teacher: n=>`Xush kelibsiz, ${n}! O'qituvchi paneliga kirildi ✓`,
  admin:   n=>`Xush kelibsiz, ${n}! Admin paneliga kirildi ✓`,
  otaona:  n=>`Xush kelibsiz, ${n}! Ota-ona paneliga kirildi ✓`
};
let role = "student";
let eyeOpen = false;

function pick(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  role = el.dataset.role;
  document.getElementById("lbl").textContent = LABELS[role];
  document.getElementById("liPh").textContent = PLACEHOLDERS[role];
  document.getElementById("li").value = "";
  document.getElementById("pi").value = "";
  const m = document.getElementById("msg");
  m.className = "msg"; m.textContent = "";
}

function toggleEye(){
  eyeOpen = !eyeOpen;
  const p = document.getElementById("pi");
  const ic = document.getElementById("eyeIcon");
  p.type = eyeOpen ? "text" : "password";
  ic.innerHTML = eyeOpen
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
       <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
}

function go(e){
  const btn = document.getElementById("loginBtn");
  const r = document.createElement("span");
  r.className = "ripple";
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(), 600);

  const l = document.getElementById("li").value.trim();
  const p = document.getElementById("pi").value.trim();
  const m = document.getElementById("msg");

  // 1. Maydonlar bo'sh bo'lsa xatolik chiqarish
  if(!l || !p){
    m.className = "msg er";
    m.textContent = "Barcha maydonlarni to'ldiring!";
    document.querySelectorAll(".shell").forEach(s=>{
      s.classList.remove("shake");
      void s.offsetWidth;
      s.classList.add("shake");
    });
    return;
  }

  // 2. Muvaffaqiyatli login xabari
  m.className = "msg ok";
  m.textContent = GREET[role](l);

  // 3. Tugmani loading holatiga o'tkazish
  btn.disabled = true; // Qayta-qayta bosib tashlamaslik uchun
  btn.style.opacity = "0.7";
  
  if (role === "admin") {
    btn.textContent = "LOADING ADMIN PROFILE...";
  } else if (role === "student") {
    btn.textContent = "LOADING STUDENT PROFILE...";
  } else if (role === "teacher") {
    btn.textContent = "LOADING TEACHER PROFILE...";
  } else if (role === "otaona") {
    btn.textContent = "LOADING PARENT PROFILE...";
  }

  // 4. 1.5 soniyadan keyin tegishli sahifaga o'tkazib yuborish
  setTimeout(() => {
    if (role === "admin") {
      window.location.href = "admin.html"; 
    } else if (role === "student") {
      window.location.href = "Parents/parent.html";
    } else if (role === "teacher") {
      window.location.href = "teacher.html";
    } else if (role === "otaona") {
      window.location.href = "parents.html";
    }
  }, 1500); // 1.5 soniya kutadi (effekt yaxshi bilinishi uchun)
}   
</script>
</body>
</html>
